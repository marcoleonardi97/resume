            resizeCanvas();
            generateBackgroundStars();
            generateParticles();
            setupEventListeners();
            animate();
            
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function generateBackgroundStars() {
            backgroundStars = [];
            for (let i = 0; i < 200; i++) {
                backgroundStars.push({
                    x: Math.random() * width * 3 - width,
                    y: Math.random() * height * 3 - height,
                    size: Math.random() * 2,
                    opacity: Math.random() * 0.5 + 0.3,
                    twinkleSpeed: Math.random() * 0.02 + 0.01,
                    twinklePhase: Math.random() * Math.PI * 2
                });
            }
        }

        function generateParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * width * 2 - width / 2,
                    y: Math.random() * height * 2 - height / 2,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 0.5) * 0.2,
                    size: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.3 + 0.2
                });
            }
        }

        function worldToScreen(worldX, worldY) {
            return {
                x: (worldX - camera.x) * camera.zoom + width / 2,
                y: (worldY - camera.y) * camera.zoom + height / 2
            };
        }

        function screenToWorld(screenX, screenY) {
            return {
                x: (screenX - width / 2) / camera.zoom + camera.x,
                y: (screenY - height / 2) / camera.zoom + camera.y
            };
        }

        function drawBackground() {
            // Gradient background
            const gradient = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, Math.max(width, height));
            gradient.addColorStop(0, '#0a0e1a');
            gradient.addColorStop(1, '#050810');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Background stars
            backgroundStars.forEach((star, i) => {
                const pos = worldToScreen(star.x, star.y);
                if (pos.x < -50 || pos.x > width + 50 || pos.y < -50 || pos.y > height + 50) return;

                star.twinklePhase += star.twinkleSpeed;
                const twinkle = Math.sin(star.twinklePhase) * 0.3 + 0.7;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity * twinkle})`;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Particles
            particles.forEach(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;

                if (particle.x < -width) particle.x = width;
                if (particle.x > width) particle.x = -width;
                if (particle.y < -height) particle.y = height;
                if (particle.y > height) particle.y = -height;

                const pos = worldToScreen(particle.x, particle.y);
                
                const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, particle.size * 3);
                gradient.addColorStop(0, `rgba(201, 209, 217, ${particle.opacity})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, particle.size * 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawConstellation(constellation, centerX, centerY) {
            const stars = constellation.stars;
            const color = constellation.color;

            // Draw connections between stars
            ctx.strokeStyle = color + '30';
            ctx.lineWidth = 1.5;
            
            stars.forEach((star, i) => {
                const starX = centerX + Math.cos(star.angle * Math.PI / 180) * star.distance;
                const starY = centerY + Math.sin(star.angle * Math.PI / 180) * star.distance;
                const pos1 = worldToScreen(starX, starY);

                // Connect to next star
                const nextStar = stars[(i + 1) % stars.length];
                const nextX = centerX + Math.cos(nextStar.angle * Math.PI / 180) * nextStar.distance;
                const nextY = centerY + Math.sin(nextStar.angle * Math.PI / 180) * nextStar.distance;
                const pos2 = worldToScreen(nextX, nextY);

                ctx.beginPath();
                ctx.moveTo(pos1.x, pos1.y);
                ctx.lineTo(pos2.x, pos2.y);
                ctx.stroke();

                // Connect to center
                const centerPos = worldToScreen(centerX, centerY);
                ctx.beginPath();
                ctx.moveTo(pos1.x, pos1.y);
                ctx.lineTo(centerPos.x, centerPos.y);
                ctx.stroke();
            });

            // Draw stars
            stars.forEach(star => {
                const starX = centerX + Math.cos(star.angle * Math.PI / 180) * star.distance;
                const starY = centerY + Math.sin(star.angle * Math.PI / 180) * star.distance;
                const pos = worldToScreen(starX, starY);

                const isHovered = hoveredStar && hoveredStar.star === star;
                const isSelected = selectedStar && selectedStar.star === star;
                const size = star.size * camera.zoom;

                // Glow effect
                if (isHovered || isSelected) {
                    const glowGradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, size * 4);
                    glowGradient.addColorStop(0, color + '60');
                    glowGradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = glowGradient;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, size * 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Main star
                const starGradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, size);
                starGradient.addColorStop(0, '#ffffff');
                starGradient.addColorStop(0.3, color);
                starGradient.addColorStop(1, color + '80');
                
                ctx.fillStyle = starGradient;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                ctx.fill();

                // Pulse effect for selected
                if (isSelected) {
                    const pulseSize = size * (1 + Math.sin(Date.now() * 0.003) * 0.3);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, pulseSize * 1.5, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Store star position for hit detection
                star._screenPos = pos;
                star._constellation = constellation.name;
                star._color = color;
            });
        }

        function drawCenter() {
            const center = constellationData.center;
            const pos = worldToScreen(center.x, center.y);
            const size = center.size * camera.zoom;

            // Massive glow
            const megaGlow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, size * 8);
            megaGlow.addColorStop(0, center.color + '40');
            megaGlow.addColorStop(0.5, center.color + '20');
            megaGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = megaGlow;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, size * 8, 0, Math.PI * 2);
            ctx.fill();

            // Outer ring
            const ringGradient = ctx.createRadialGradient(pos.x, pos.y, size * 2, pos.x, pos.y, size * 3);
            ringGradient.addColorStop(0, 'transparent');
            ringGradient.addColorStop(0.5, center.color + '60');
            ringGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = ringGradient;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, size * 3, 0, Math.PI * 2);
            ctx.fill();

            // Main sun
            const sunGradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, size);
            sunGradient.addColorStop(0, '#ffffff');
            sunGradient.addColorStop(0.4, center.color);
            sunGradient.addColorStop(1, center.color + '80');
            
            ctx.fillStyle = sunGradient;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
            ctx.fill();

            // Rotating rays
            const rayCount = 8;
            const rayLength = size * 2;
            const rotation = Date.now() * 0.0005;
            
            ctx.strokeStyle = center.color + '40';
            ctx.lineWidth = 3;
            
            for (let i = 0; i < rayCount; i++) {
                const angle = (Math.PI * 2 * i / rayCount) + rotation;
                const x2 = pos.x + Math.cos(angle) * rayLength;
                const y2 = pos.y + Math.sin(angle) * rayLength;
                
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            // Store for hit detection
            center._screenPos = pos;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            drawBackground();
            
            // Draw center first
            drawCenter();
            
            // Draw all constellations
            Object.entries(constellationData.constellations).forEach(([key, constellation]) => {
                drawConstellation(constellation, constellation.centerX, constellation.centerY);
            });

            // Draw constellation names
            Object.entries(constellationData.constellations).forEach(([key, constellation]) => {
                const pos = worldToScreen(constellation.centerX, constellation.centerY);
                const size = 1.3 * camera.zoom;
                
                ctx.fillStyle = constellation.color;
                ctx.font = `${size}rem Cinzel, serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = constellation.color;
                ctx.shadowBlur = 15;
                ctx.fillText(constellation.name.toUpperCase(), pos.x, pos.y);
                ctx.shadowBlur = 0;
            });
        }

        function checkStarHover(x, y) {
            // Check center
            const center = constellationData.center;
            if (center._screenPos) {
                const dx = x - center._screenPos.x;
                const dy = y - center._screenPos.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < center.size * camera.zoom) {
                    return { star: center, type: 'center' };
                }
            }

            // Check constellation stars
            for (const [key, constellation] of Object.entries(constellationData.constellations)) {
                for (const star of constellation.stars) {
                    if (!star._screenPos) continue;
                    
                    const dx = x - star._screenPos.x;
                    const dy = y - star._screenPos.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < star.size * camera.zoom) {
                        return { star, constellation: constellation.name, color: constellation.color };
                    }
                }
            }
            
            return null;
        }

        function showDetails(starData) {
            const panel = document.getElementById('detail-panel');
            const star = starData.star;
            
            panel.querySelector('.panel-title').textContent = star.name;
            panel.querySelector('.panel-category').textContent = starData.type === 'center' ? 'CORE' : starData.constellation;
            
            let contentHTML = '';
            
            if (starData.type === 'center') {
                contentHTML = `
                    <p>${star.description}</p>
                    <div class="panel-tags">
                        <span class="panel-tag">📍 ${star.details.location}</span>
                        <span class="panel-tag">✉️ ${star.details.email}</span>
                    </div>
                    <p style="margin-top: 1.5rem; color: var(--accent);">
                        <strong>Currently seeking:</strong> ${star.details.seeking}
                    </p>
                `;
            } else {
                contentHTML = `<p>${star.description}</p>`;
                
                if (star.mastery) {
                    contentHTML += `<p style="color: var(--accent); margin-top: 1rem;"><strong>Mastery Level:</strong> ${star.mastery}</p>`;
                }
                
                if (star.details && star.details.length > 0) {
                    contentHTML += '<ul>';
                    star.details.forEach(detail => {
                        contentHTML += `<li>${detail}</li>`;
                    });
                    contentHTML += '</ul>';
                }
                
                if (star.tags) {
                    contentHTML += '<div class="panel-tags">';
                    star.tags.forEach(tag => {
                        contentHTML += `<span class="panel-tag">${tag}</span>`;
                    });
                    contentHTML += '</div>';
                }
                
                if (star.links) {
                    contentHTML += '<div class="panel-links">';
                    star.links.forEach(link => {
                        contentHTML += `<a href="${link.url}" class="panel-link" target="_blank">${link.text} →</a>`;
                    });
                    contentHTML += '</div>';
                }
            }
            
            panel.querySelector('.panel-content').innerHTML = contentHTML;
            panel.classList.add('active');
        }

        function setupEventListeners() {
            // Mouse events
            let dragDistance = 0;
            
            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                dragStart = { x: e.clientX, y: e.clientY };
                dragDistance = 0;
                document.body.classList.add('dragging');
            });

            canvas.addEventListener('mousemove', (e) => {
                lastMousePos = { x: e.clientX, y: e.clientY };
                
                if (isDragging) {
                    const dx = e.clientX - dragStart.x;
                    const dy = e.clientY - dragStart.y;
                    dragDistance += Math.abs(dx) + Math.abs(dy);
                    camera.x -= dx / camera.zoom;
                    camera.y -= dy / camera.zoom;
                    dragStart = { x: e.clientX, y: e.clientY };
                } else {
                    const newHover = checkStarHover(e.clientX, e.clientY);
                    if (newHover !== hoveredStar) {
                        hoveredStar = newHover;
                        canvas.style.cursor = hoveredStar ? 'pointer' : 'grab';
                    }
                }
            });

            canvas.addEventListener('mouseup', (e) => {
                // Hide instructions on first interaction
                document.getElementById('instructions').classList.add('hidden');
                
                // Only trigger click if we didn't drag much
                if (dragDistance < 5) {
                    const clicked = checkStarHover(e.clientX, e.clientY);
                    if (clicked) {
                        selectedStar = clicked;
                        showDetails(clicked);
                    }
                }
                isDragging = false;
                dragDistance = 0;
                document.body.classList.remove('dragging');
            });

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                camera.targetZoom = Math.max(0.3, Math.min(3, camera.targetZoom * delta));
            });

            // Touch events
            let touchStartDist = 0;
            
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                } else if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    touchStartDist = Math.sqrt(dx * dx + dy * dy);
                }
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                
                if (e.touches.length === 1 && isDragging) {
                    const dx = e.touches[0].clientX - dragStart.x;
                    const dy = e.touches[0].clientY - dragStart.y;
                    camera.x -= dx / camera.zoom;
                    camera.y -= dy / camera.zoom;
                    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                } else if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const delta = dist / touchStartDist;
                    camera.targetZoom = Math.max(0.3, Math.min(3, camera.zoom * delta));
                    touchStartDist = dist;
                }
            });

            canvas.addEventListener('touchend', (e) => {
                // Hide instructions on first touch
                document.getElementById('instructions').classList.add('hidden');
                
                if (e.touches.length === 0) {
                    isDragging = false;
                }
            });

            // Control buttons
            document.getElementById('zoom-in').addEventListener('click', () => {
                camera.targetZoom = Math.min(3, camera.targetZoom * 1.3);
            });

            document.getElementById('zoom-out').addEventListener('click', () => {
                camera.targetZoom = Math.max(0.3, camera.targetZoom * 0.7);
            });

            document.getElementById('reset').addEventListener('click', () => {
                camera.x = 0;
                camera.y = 0;
                camera.targetZoom = 1;
            });

            // Panel close
            document.querySelector('.panel-close').addEventListener('click', () => {
                document.getElementById('detail-panel').classList.remove('active');
                selectedStar = null;
            });

            // Window resize
            window.addEventListener('resize', () => {
                resizeCanvas();
                generateBackgroundStars();
            });
        }

        function animate() {
            // Smooth zoom
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.1;
            
            draw();
            requestAnimationFrame(animate);
        }

        // Start
        init();
    </script>
</body>
</html>
